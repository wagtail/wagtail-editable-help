[tox]
skipsdist = True
usedevelop = True

envlist = python{3.10,3.11,3.12,3.13,3.14}-django{5.2,6.0,main}-wagtail{7.0,7.3,7.4,main}-{sqlite,postgres}

[flake8]
# E501: Line too long
# W503: line break before binary operator (superseded by W504 line break after binary operator)
ignore = E501,W503
exclude = migrations,node_modules

[testenv]
install_command = pip install -e ".[testing]" -U {opts} {packages}
commands = coverage run testmanage.py test --deprecation all

basepython =
    python3.10: python3.10
    python3.11: python3.11
    python3.12: python3.12
    python3.13: python3.13
    python3.14: python3.14

deps =
    coverage

    django5.2: Django>=5.2,<6.0
    django6.0: Django>=6.0,<7.0

    djangomain: git+https://github.com/django/django.git@main#egg=Django

    wagtail7.0: wagtail>=7.0,<7.1
    wagtail7.3: wagtail>=7.3,<7.4
    wagtail7.4: wagtail>=7.4,<7.5
    wagtailmain: git+https://github.com/wagtail/wagtail.git

    postgres: psycopg2>=2.6

setenv =
    postgres: DATABASE_URL={env:DATABASE_URL:postgres:///wagtail_editable_help}

[testenv:flake8]
basepython=python3.10
deps=flake8>=2.2.0
commands=flake8 wagtail_editable_help
